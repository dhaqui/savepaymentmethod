services:
  - type: web
    name: paypal-save-card
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: production
      - key: BASE_URL
        sync: false
